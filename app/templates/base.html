<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mikrotik Whitelist Service{% endblock %}</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      const theme = savedTheme || "dark";
      document.documentElement.setAttribute("data-bs-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: var(--bs-body-bg);
      color: var(--bs-body-color);
    }
    .sidebar {
      min-height: 100vh;
      background: #212529;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }
    .sidebar .nav-link { color: #adb5bd; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #343a40; border-radius: 4px; }
    .sidebar-brand { color: #fff; font-weight: 600; font-size: 1.1rem; }
    .status-badge { font-size: 0.75rem; }
    td, th { vertical-align: middle !important; }

    /* Improve readability for tables/cards that were originally tuned for light mode */
    [data-bs-theme="dark"] .table {
      --bs-table-bg: var(--bs-body-bg);
      --bs-table-striped-bg: #1f2328;
      --bs-table-hover-bg: #222831;
      --bs-table-color: var(--bs-body-color);
      --bs-table-border-color: #343a40;
    }
    [data-bs-theme="dark"] .bg-white {
      background-color: #212529 !important;
      color: var(--bs-body-color);
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 sidebar py-3 d-flex flex-column gap-1 px-3">
      <div class="sidebar-brand mb-3 px-2">
        <i class="bi bi-shield-fill-check me-2"></i>MikroTik<br>Whitelist Service
      </div>
      <a href="/configuration"
         class="nav-link {% if request.url.path in ['/', '/configuration'] %}active{% endif %}">
        <i class="bi bi-gear me-2"></i>Configuration
      </a>
      <a href="/iplists"
         class="nav-link {% if request.url.path == '/iplists' %}active{% endif %}">
        <i class="bi bi-list-ul me-2"></i>IP Lists
      </a>
      <a href="/exports"
         class="nav-link {% if request.url.path == '/exports' %}active{% endif %}">
        <i class="bi bi-box-arrow-down me-2"></i>Exports
      </a>
      <a href="/firewalls"
         class="nav-link {% if request.url.path == '/firewalls' %}active{% endif %}">
        <i class="bi bi-hdd-network me-2"></i>Firewalls
      </a>
      <a href="/status"
         class="nav-link {% if request.url.path == '/status' %}active{% endif %}">
        <i class="bi bi-activity me-2"></i>Status &amp; Logs
      </a>
      <hr class="text-secondary my-3">
      <button id="theme-toggle" class="btn btn-sm btn-outline-light w-100" type="button">
        <i id="theme-toggle-icon" class="bi bi-sun me-2"></i>
        <span id="theme-toggle-label">Switch to Light Mode</span>
      </button>
    </nav>

    <!-- Main content -->
    <main class="col-md-10 py-4 px-4">
      {% block content %}{% endblock %}
      <footer class="mt-4 pt-3 border-top small text-muted d-flex flex-wrap gap-3 align-items-center">
        <span>
          Built by <strong>Casey Benefield</strong>
        </span>
        <a href="https://github.com/nz2o/Mikrotik-Whitelist-Service" target="_blank" rel="noopener noreferrer">
          Git Repository
        </a>
        <a href="https://github.com/nz2o/Mikrotik-Whitelist-Service/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">
          License
        </a>
      </footer>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    const storageKey = "theme";
    const root = document.documentElement;
    const button = document.getElementById("theme-toggle");
    const icon = document.getElementById("theme-toggle-icon");
    const label = document.getElementById("theme-toggle-label");

    function updateThemeUI(theme) {
      if (!icon || !label) {
        return;
      }
      if (theme === "dark") {
        icon.className = "bi bi-sun me-2";
        label.textContent = "Switch to Light Mode";
      } else {
        icon.className = "bi bi-moon-stars me-2";
        label.textContent = "Switch to Dark Mode";
      }
    }

    function applyTheme(theme) {
      root.setAttribute("data-bs-theme", theme);
      localStorage.setItem(storageKey, theme);
      updateThemeUI(theme);
    }

    const current = localStorage.getItem(storageKey) || "dark";
    applyTheme(current);

    if (button) {
      button.addEventListener("click", function () {
        const next = root.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
        applyTheme(next);
      });
    }
  })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
