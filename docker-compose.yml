services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      mikrotik-net:
        ipv4_address: 172.19.0.2

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - rawiplists:/app/data/rawiplists
    env_file: .env
    environment:
      SERVICE_ROLE: api
    networks:
      mikrotik-net:
        ipv4_address: 172.19.0.3

  fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app.services.fetcher
    volumes:
      - rawiplists:/app/data/rawiplists
    env_file: .env
    environment:
      SERVICE_ROLE: fetcher
    networks:
      mikrotik-net:
        ipv4_address: 172.19.0.5

  applicator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app.services.applicator
    volumes:
      - rawiplists:/app/data/rawiplists
    env_file: .env
    environment:
      SERVICE_ROLE: applicator
    networks:
      mikrotik-net:
        ipv4_address: 172.19.0.4

volumes:
  postgres_data:
  rawiplists:

networks:
  mikrotik-net:
    driver: bridge
      ipam:
        config:
          - subnet: 172.19.0.0/16 # Define your subnet - or exclude this for DNS-based.
            gateway: 172.19.0.1 # Define your gateway - or exclude this for DNS-based.